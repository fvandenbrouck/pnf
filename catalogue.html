<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNF – Catalogue</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <span class="nav-brand">
    <span class="nav-badge">PNF</span>
    Catalogue 2026-2027
  </span>
  <div class="nav-links">
    <a href="catalogue.html" class="active">Catalogue</a>
    <a href="saisie.html" id="nav-saisie" style="display:none">+ Nouvelle action</a>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-email"></span>
    <span class="nav-profile" id="nav-profile"></span>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Catalogue des actions de formation</h1>
    <p>Plan national de formation continue – DGESCO</p>
  </div>

  <!-- Filtres -->
  <div class="card">
    <div class="card-head"><span class="card-dot"></span><h2>Filtres</h2></div>
    <div class="card-body" style="display:grid;gap:12px">
      <div class="field">
        <label class="flabel" for="f-search">Recherche libre</label>
        <input type="text" id="f-search" placeholder="Titre, axe…" oninput="applyFilters()">
      </div>
      <div class="field-row">
        <div class="field">
          <label class="flabel" for="f-axe">Axe</label>
          <select id="f-axe" onchange="applyFilters()">
            <option value="">Tous les axes</option>
          </select>
        </div>
        <div class="field">
          <label class="flabel" for="f-volet">Volet</label>
          <select id="f-volet" onchange="applyFilters()">
            <option value="">Tous les volets</option>
          </select>
        </div>
      </div>
      <div class="field-row-3">
        <div class="field">
          <label class="flabel" for="f-periode">Période</label>
          <select id="f-periode" onchange="applyFilters()">
            <option value="">Toutes les périodes</option>
          </select>
        </div>
        <div class="field">
          <label class="flabel" for="f-struct">Structure</label>
          <select id="f-struct" onchange="applyFilters()">
            <option value="">Toutes les structures</option>
          </select>
        </div>
        <div class="field">
          <label class="flabel" for="f-modalite">Modalité</label>
          <select id="f-modalite" onchange="applyFilters()">
            <option value="">Toutes les modalités</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="flabel" for="f-public">Public cible</label>
        <select id="f-public" onchange="applyFilters()">
          <option value="">Tous les publics</option>
        </select>
      </div>
      <div class="field">
        <label class="flabel" for="f-lieu">Lieu</label>
        <select id="f-lieu" onchange="applyFilters()">
          <option value="">Tous les lieux</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Réinitialiser</button>
      </div>
    </div>
  </div>

  <!-- Barre résultats + export -->
  <div class="results-bar">
    <span class="results-count" id="results-count">–</span>
    <div class="view-toggle">
      <button id="view-table" class="active" onclick="setView('table')">☰ Tableau</button>
      <button id="view-cards" onclick="setView('cards')">⊞ Cartes</button>
    </div>
    <div class="export-bar">
      <button class="btn btn-ghost btn-sm" onclick="exportExcel()">↓ CSV/Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="exportPDF()">↓ PDF</button>
    </div>
  </div>

  <!-- Résultats -->
  <div id="results-container"></div>
</div>

<div id="loader"><div class="spinner"></div><p>Chargement…</p></div>
<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogue.js"></script>
<script>initCatalogue();</script>
</body>
</html>
