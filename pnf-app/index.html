<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNF 2026-2027 – Connexion</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0c1824 0%,#1e3a5f 100%)}
  .login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.3)}
  .login-logo{text-align:center;margin-bottom:28px}
  .login-logo img{height:48px;margin-bottom:12px}
  .login-logo h1{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .login-logo p{font-size:12px;color:var(--ink3);margin-top:4px}
  .login-box .field{margin-bottom:16px}
  .login-hint{font-size:11px;color:var(--ink3);margin-top:20px;text-align:center;line-height:1.6}
  .login-hint a{color:var(--accent);text-decoration:none}
  .login-hint a:hover{text-decoration:underline}
  .err-box{background:var(--red-l);border:1px solid #fca5a5;border-radius:6px;padding:10px 14px;font-size:12px;color:var(--red);margin-top:12px;display:none}
  .err-box.show{display:block}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <img src="https://upload.wikimedia.org/wikipedia/fr/thumb/9/93/Logo_DGESCO.svg/200px-Logo_DGESCO.svg.png"
         alt="DGESCO" onerror="this.style.display='none'">
    <h1>Catalogue PNF</h1>
    <p>2026-2027 — DGESCO</p>
  </div>

  <div class="field">
    <label class="flabel" for="api-key">Clé API Grist <span class="req">*</span></label>
    <input type="password" id="api-key" placeholder="Votre clé API personnelle"
           autocomplete="current-password">
  </div>

  <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">
    Se connecter
  </button>

  <div class="err-box" id="err-box"></div>

  <p class="login-hint">
    Votre clé API est disponible dans<br>
    <a href="https://grist.numerique.gouv.fr" target="_blank">grist.numerique.gouv.fr</a>
    → Paramètres du profil → API
  </p>
</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  // Rediriger si déjà connecté
  if (sessionStorage.getItem('grist_key')) window.location.href = 'catalogue.html';

  document.getElementById('api-key').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const key = document.getElementById('api-key').value.trim();
    const err = document.getElementById('err-box');
    err.classList.remove('show');
    if (!key) { err.textContent='Veuillez saisir votre clé API'; err.classList.add('show'); return; }

    const btn = document.querySelector('button.btn-primary');
    btn.disabled = true; btn.textContent = 'Connexion…';
    try {
      await login(key);
      window.location.href = 'catalogue.html';
    } catch(e) {
      err.textContent = 'Clé API invalide ou accès refusé. Vérifiez votre clé.';
      err.classList.add('show');
      sessionStorage.clear();
    } finally {
      btn.disabled=false; btn.textContent='Se connecter';
    }
  }
</script>
</body>
</html>
